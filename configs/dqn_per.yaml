env: LunarLander-v3
buffer_type: per
buffer_capacity: 100000
per_alpha: 0.5
per_beta: 0.5
total_steps: 500000
batch_size: 64
lr: 0.0001
gamma: 0.99
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay: 200000
target_update: 500
